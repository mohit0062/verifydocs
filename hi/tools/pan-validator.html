  </nav>

  <h1 class="text-3xl md:text-4xl font-extrabold text-text-main mb-6 leading-tight">
    पैन कार्ड चेक — फॉर्मेट वैलिडेट करें
  </h1>

  <div class="bg-white rounded-3xl border border-border-col p-6 md:p-8 mb-10 shadow-sm leading-relaxed text-text-muted">
    <p>
      स्थायी खाता संख्या (PAN) आयकर विभाग द्वारा जारी किया गया 10-अंकों का कोड है। हमारा टूल चेक करता है कि क्या पैन आधिकारिक संरचना (5 अक्षर, 4 अंक, 1 अक्षर) का पालन करता है।
    </p>
  </div>

  <div class="bg-white rounded-3xl border-2 border-primary/20 p-6 md:p-10 mb-16 shadow-xl relative overflow-hidden">
    <label for="pan-input" class="block text-sm font-bold text-text-main mb-3 uppercase tracking-wider">10-अंकों का पैन नंबर डालें</label>
    <div class="flex flex-col sm:flex-row gap-4">
      <input 
        type="text" 
        id="pan-input" 
        placeholder="ABCDE1234F" 
        maxlength="10"
        class="flex-1 h-16 px-6 border-2 border-border-col rounded-2xl text-xl font-mono focus:outline-none focus:border-primary uppercase tracking-widest"
      >
      <button onclick="handlePANValidate()" class="h-16 px-10 bg-primary text-white font-bold rounded-2xl hover:bg-blue-700 transition shadow-lg">
        चेक करें →
      </button>
    </div>
    <div id="pan-result" class="mt-8 hidden"></div>
  </div>
</main>

<script src="../../assets/js/validators.js"></script>
<script>
  function handlePANValidate() {
    const val = document.getElementById('pan-input').value.trim().toUpperCase();
    const resArea = document.getElementById('pan-result');
    if (!val) return;
    
    const res = validatePAN(val);
    resArea.classList.remove('hidden');
    
    if (res.valid) {
      resArea.innerHTML = `
        <div class="p-6 bg-green-50 border border-green-200 rounded-2xl">
          <p class="font-bold text-green-800">✓ वैध पैन फॉर्मेट</p>
          <p class="text-sm text-green-700 mt-1">प्रकार: ${res.entityType}</p>
        </div>
      `;
    } else {
      resArea.innerHTML = `
        <div class="p-6 bg-red-50 border border-red-200 rounded-2xl">
          <p class="font-bold text-red-800">✗ अवैध फॉर्मेट</p>
          <p class="text-sm text-red-700 mt-1">${res.reason}</p>
        </div>
      `;
    }
  }
</script>
