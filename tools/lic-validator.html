    <p>Life Insurance Corporation of India (LIC) policy numbers are exactly 9 digits long. Our tool helps you verify the format and catch typos before you pay premiums or check status online.</p>
  </div>

  <div class="bg-white rounded-3xl border-2 border-primary/20 p-6 md:p-10 shadow-xl">
    <label class="block text-sm font-bold mb-3 uppercase">Enter 9-Digit LIC Policy Number</label>
    <div class="flex flex-col sm:flex-row gap-4">
      <input 
        type="text" 
        id="lic-input" 
        placeholder="123456789" 
        maxlength="11"
        class="flex-1 h-16 px-6 border-2 border-border-col rounded-2xl text-xl font-mono focus:outline-none focus:border-primary tracking-widest"
      >
      <button onclick="handleLICValidate()" class="h-16 px-10 bg-primary text-white font-bold rounded-2xl hover:bg-blue-700 transition">Validate →</button>
    </div>
    <div id="lic-result" class="mt-8 hidden"></div>
  </div>

<script src="../assets/js/validators.js"></script>
<script>
  const input = document.getElementById('lic-input');
  input.addEventListener('input', (e) => {
    let v = e.target.value.replace(/\D/g, '');
    if (v.length > 0) {
      const parts = v.match(/.{1,3}/g);
      e.target.value = parts ? parts.join(' ') : v;
    }
  });

  function handleLICValidate() {
    const val = input.value.replace(/\s/g, '');
    const resArea = document.getElementById('lic-result');
    if (!val) return;
    
    const res = validateLIC(val);
    resArea.classList.remove('hidden');
    
    if (res.valid) {
      resArea.innerHTML = `<div class="p-6 bg-green-50 border border-green-200 rounded-2xl"><p class="font-bold text-green-800">✓ Valid LIC Format</p><p class="text-sm text-green-700 mt-1">Formatted: ${res.formatted}</p></div>`;
    } else {
      resArea.innerHTML = `<div class="p-6 bg-red-50 border border-red-200 rounded-2xl"><p class="font-bold text-red-800">✗ Invalid Format</p><p class="text-sm text-red-700 mt-1">${res.reason}</p></div>`;
    }
  }
</script>
