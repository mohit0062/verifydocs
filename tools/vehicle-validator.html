<main class="max-w-3xl mx-auto px-4 py-10 md:py-16">
  <h1 class="text-3xl font-extrabold text-text-main mb-6">Vehicle Registration Validator</h1>
  
  <div class="bg-white rounded-3xl border border-border-col p-6 mb-10 text-text-muted">
    <p>Indian vehicle number plates follow the format: State Code (2 letters) + District Code (2 digits) + Series (0-3 letters) + 4 digits. Example: DL 01 C 1234. Our tool verifies this format and identifies the state.</p>
  </div>

  <div class="bg-white rounded-3xl border-2 border-primary/20 p-6 md:p-10 shadow-xl">
    <label class="block text-sm font-bold mb-3 uppercase">Enter Vehicle Number (e.g. DL01C1234)</label>
    <div class="flex flex-col sm:flex-row gap-4">
      <input 
        type="text" 
        id="vehicle-input" 
        placeholder="DL01C1234" 
        maxlength="12"
        class="flex-1 h-16 px-6 border-2 border-border-col rounded-2xl text-xl font-mono focus:outline-none focus:border-primary uppercase tracking-widest"
      >
      <button onclick="handleVehicleValidate()" class="h-16 px-10 bg-primary text-white font-bold rounded-2xl hover:bg-blue-700 transition">Validate →</button>
    </div>
    <div id="vehicle-result" class="mt-8 hidden"></div>
  </div>
</main>

<script src="../assets/js/validators.js"></script>
<script>
  function handleVehicleValidate() {
    const val = document.getElementById('vehicle-input').value.trim().toUpperCase().replace(/\s/g, '');
    const resArea = document.getElementById('vehicle-result');
    if (!val) return;
    
    const res = validateVehicle(val);
    resArea.classList.remove('hidden');
    
    if (res.valid) {
      resArea.innerHTML = `<div class="p-6 bg-green-50 border border-green-200 rounded-2xl"><p class="font-bold text-green-800">✓ Valid Registration Format</p><p class="text-sm text-green-700 mt-1">State: ${res.stateName} | Formatted: ${res.formatted}</p></div>`;
    } else {
      resArea.innerHTML = `<div class="p-6 bg-red-50 border border-red-200 rounded-2xl"><p class="font-bold text-red-800">✗ Invalid Format</p><p class="text-sm text-red-700 mt-1">${res.reason}</p></div>`;
    }
  }
</script>
