          <label class="block text-sm font-semibold text-red-600 mb-1">Admin Password</label>
          <input type="password" id="password" class="w-full h-12 px-4 border border-red-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-red-500/30 focus:border-red-500 bg-red-50" placeholder="Enter password to publish">
        </div>

        <button onclick="publishBlog()" id="publish-btn" class="w-full h-14 bg-primary text-white font-bold rounded-xl hover:bg-blue-700 transition mt-4">
          🚀 Publish Blog to Live Site
        </button>

        <div id="status" class="mt-4 text-sm font-medium hidden p-4 rounded-xl"></div>
      </div>
    </div>
  </div>

  <script>
    async function publishBlog() {
      const title = document.getElementById('title').value;
      const slug = document.getElementById('slug').value;
      const description = document.getElementById('description').value;
      const content = document.getElementById('content').value;
      const password = document.getElementById('password').value;
      const statusDiv = document.getElementById('status');
      const btn = document.getElementById('publish-btn');

      if(!title || !slug || !content || !password) {
        alert("Please fill all required fields!");
        return;
      }

      btn.disabled = true;
      btn.innerHTML = "⏳ Publishing... (This takes 10-15 seconds)";
      statusDiv.className = "mt-4 text-sm font-medium p-4 rounded-xl bg-blue-50 text-blue-700 block";
      statusDiv.innerHTML = "Creating file and updating index on GitHub...";

      try {
        const res = await fetch('/api/publish', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ title, slug, description, content, password })
        });

        const data = await res.json();

        if(res.ok) {
          statusDiv.className = "mt-4 text-sm font-medium p-4 rounded-xl bg-green-50 text-green-700 block";
          statusDiv.innerHTML = `✅ Successfully Published! Vercel is deploying it right now. <a href="${data.url}" class="underline font-bold" target="_blank">View Live Blog in 1 min</a>`;
        } else {
          throw new Error(data.error || "Failed to publish");
        }
      } catch(e) {
        statusDiv.className = "mt-4 text-sm font-medium p-4 rounded-xl bg-red-50 text-red-700 block";
        statusDiv.innerHTML = `❌ Error: ${e.message}`;
      } finally {
        btn.disabled = false;
        btn.innerHTML = "🚀 Publish Blog to Live Site";
      }
    }
  </script>
